version: '3.8'

services:
  postgres_db:
    image: postgres:15
    container_name: etl_catalogador_db
    environment:
      POSTGRES_USER: usuario_catalogo
      POSTGRES_PASSWORD: pecas
      POSTGRES_DB: catalogo_jd
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: